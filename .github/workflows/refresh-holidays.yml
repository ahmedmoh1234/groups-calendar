name: Refresh holidays JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: refresh-holidays
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: python -m pip install -r scripts/presidency_holidays/requirements.txt

      - name: Regenerate holidays JSON
        run: python scripts/presidency_holidays/fetch_holidays.py

      - name: Commit and push updated JSON
        run: |
          git add scripts/presidency_holidays/holidays.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh holidays json"
          git push
